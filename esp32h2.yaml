esphome:
  name: esp32h2
  friendly_name: esp32h2


esp32:
  board: esp32-h2-devkitm-1
  variant: ESP32H2
  framework:
    type: esp-idf

logger:
#  level: VERY_VERBOSE

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

#wifi:
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password
#  power_save_mode: none
#  # esp32 needs the output_power setting, see https://github.com/espressif/arduino-esp32/issues/2144#issuecomment-2028949116
#  output_power: 8.5dB

web_server:
  port: 80

prometheus:

sensor:
  - platform: uptime
    name: Uptime

#  - platform: wifi_signal
#    name: WiFi Signal
#    update_interval: 60s

status_led:
  pin:
    number: GPIO21  #LED_BUILTIN
    inverted: true

network:
  enable_ipv6: true

openthread:
  device_type: FTD
  tlv: !secret thread_tlv
